async function clearCollection(colName) {
  const snap = await getDocs(collection(db, colName));
  const promises = [];
  snap.forEach(d => promises.push(deleteDoc(doc(db, colName, d.id))));
  await Promise.all(promises);
  log(`🗑️ Colección "${colName}" limpiada (${snap.size} docs)`, 'info');
}

async function loadCollection(colName, data) {
  for (const item of data) {
    await addDoc(collection(db, colName), item);
  }
  log(`✅ "${colName}" — ${data.length} productos cargados`, 'ok');
}

    log('🚀 Iniciando carga completa...', 'info');

    // Clear existing
    log('🗑️ Limpiando datos anteriores...', 'info');
    await clearCollection('productos_rest_manana');

    await clearCollection('barber_servicios');
